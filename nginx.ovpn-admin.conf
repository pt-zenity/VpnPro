server {
    server_name vpn.sis2.xyz;

    # ── Security headers ─────────────────────────────────────────────────────
    # All HTTP security headers are set by the Next.js application layer
    # (next.config.js) so they only appear once in the response.
    # Nginx does NOT add duplicates here.

    # ── Proxy to Next.js panel ───────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket / SSE support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Forward client context
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass    $http_upgrade;
        proxy_read_timeout    300s;
        proxy_connect_timeout 75s;

        # Hide the upstream server header
        proxy_hide_header X-Powered-By;
    }

    # Accept up to 10 MB uploads (agent PKI backups)
    client_max_body_size 10M;

    listen 443 ssl; # managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/vpn.sis2.xyz/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/vpn.sis2.xyz/privkey.pem;   # managed by Certbot
    include             /etc/letsencrypt/options-ssl-nginx.conf;            # managed by Certbot
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;                  # managed by Certbot
}

server {
    if ($host = vpn.sis2.xyz) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen      80;
    server_name vpn.sis2.xyz;
    return 404; # managed by Certbot
}
